<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tallgrass — Time's Up</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>You've used your time for today.</h1>
    <p class="subtitle">That's okay — it means you set a boundary and it worked.</p>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="timeSpent">—</span>
        <span class="stat-label">spent today</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="resetIn">—</span>
        <span class="stat-label">until reset</span>
      </div>
    </div>

    <p class="footer-note">Access resets at midnight. Go do something you'll be proud of.</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
